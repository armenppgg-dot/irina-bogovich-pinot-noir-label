<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1600" width="900" height="1600" role="img" aria-labelledby="title desc">
  <title id="title">Irina Bogovich Pinot Noir front label</title>
  <desc id="desc">Vertical wine label with a warm matte background, layered terroir waves, graphite lines, delicate gold accents, and centered typography.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e6"/>
      <stop offset="100%" stop-color="#ebe3d6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b58a38"/>
      <stop offset="50%" stop-color="#e0c06a"/>
      <stop offset="100%" stop-color="#9d742a"/>
    </linearGradient>
    <filter id="paperGrain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="17" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="monoNoise"/>
      <feComponentTransfer in="monoNoise" result="softNoise">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <style>
      .graphite { fill: none; stroke: #495057; stroke-linecap: round; stroke-linejoin: round; }
      .gold-line { fill: none; stroke: url(#gold); stroke-linecap: round; }
      .label-text { fill: #2f3439; font-family: "Times New Roman", Georgia, serif; text-anchor: middle; }
      .smallcaps { letter-spacing: 7px; }
      .subtitle { letter-spacing: 6px; }
      .vintage { letter-spacing: 3px; }
    </style>
  </defs>

